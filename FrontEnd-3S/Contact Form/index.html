<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Contatos</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <header class="form-header">
        <div class="container container--flex">
            <img 
                src="./images/Vector.svg" 
                alt="imagem de um contato" 
                class="form-header__image-perfil"
            >

            <h1 class="form-header__title">Contact Form</h1>
            <p class="form-header__subtitulo">
                Insira os dados do contato e clique em "Cadastrar"
            </p>
        </div>
    </header>

    <main>
        <div class="container">
            <form class="form-contact" action="">

                <!-- Nome -->
                <div class="form-contact__linha">
                    <div class="form-contact__col-a">
                        <label class="form-contact__label" for="nome">Nome</label>
                    </div>

                    <div class="form-contact__col-b">
                        <input 
                            class="form-contact__input form-contact__input--metade"
                            type="text"
                            id="nome"
                            name="nome"
                            placeholder="Nome"
                        >

                        <input 
                            class="form-contact__input form-contact__input--metade"
                            type="text"
                            id="sobrenome"
                            name="sobrenome"
                            placeholder="Sobrenome"
                        >
                    </div>
                </div>

                <!-- Email -->
                <div class="form-contact__linha">
                    <div class="form-contact__col-a">
                        <label class="form-contact__label" for="email">Email</label>
                    </div>

                    <div class="form-contact__col-b">
                        <input 
                            class="form-contact__input form-contact__input--inteira"
                            type="email"
                            id="email"
                            name="email"
                            placeholder="Email"
                        >
                    </div>
                </div>

                <!-- Telefone -->
                <div class="form-contact__linha">
                    <div class="form-contact__col-a">
                        <label class="form-contact__label" for="telefone">Telefone</label>
                    </div>

                    <div class="form-contact__col-b">
                        <input 
                            class="form-contact__input form-contact__input--terco"
                            type="tel"
                            id="telefone_pais"
                            name="telefone_pais"
                            placeholder="DDI"
                        >

                        <input 
                            class="form-contact__input form-contact__input--terco"
                            type="tel"
                            id="telefone_ddd"
                            name="telefone_ddd"
                            placeholder="DDD"
                        >

                        <input 
                            class="form-contact__input form-contact__input--terco"
                            type="tel"
                            id="telefone_numero"
                            name="telefone_numero"
                            placeholder="Número"
                        >
                    </div>
                </div>

                <!-- Endereço -->
                <div class="form-contact__linha">
                    <div class="form-contact__col-a">
                        <label class="form-contact__label" for="cep">Endereço</label>
                    </div>

                    <div class="form-contact__col-b">
                        <input 
                            class="form-contact__input form-contact__input--quarto"
                            type="text"
                            id="cep"
                            name="cep"
                            placeholder="CEP"
                            onblur="buscarEndereco(this.value)"
                        >

                        <input 
                            class="form-contact__input form-contact__input--metade"
                            type="text"
                            id="rua"
                            name="rua"
                            placeholder="Rua"
                        >

                        <input 
                            class="form-contact__input form-contact__input--quarto"
                            type="number"
                            id="numero"
                            name="numero"
                            placeholder="Número"
                        >
                    </div>
                </div>

                <!-- Complemento -->
                <div class="form-contact__linha">
                    <div class="form-contact__col-a"></div>

                    <div class="form-contact__col-b">
                        <input 
                            class="form-contact__input form-contact__input--terco"
                            type="text"
                            id="complemento"
                            name="complemento"
                            placeholder="Complemento"
                        >

                        <input 
                            class="form-contact__input form-contact__input--terco"
                            type="text"
                            id="bairro"
                            name="bairro"
                            placeholder="Bairro"
                        >

                        <input 
                            class="form-contact__input form-contact__input--terco"
                            type="text"
                            id="cidade"
                            name="cidade"
                            placeholder="Cidade"
                        >
                    </div>
                </div>

                <!-- Estado -->
                <div class="form-contact__linha">
                    <div class="form-contact__col-a"></div>

                    <div class="form-contact__col-b">
                        <input 
                            class="form-contact__input form-contact__input--terco"
                            type="text"
                            id="estado"
                            name="estado"
                            placeholder="Estado"
                        >
                    </div>
                </div>

                <!-- Anotações -->
                <div class="form-contact__linha">
                    <div class="form-contact__col-a">
                        <label class="form-contact__label" for="mensagem">Anotações</label>
                    </div>

                    <div class="form-contact__col-b">
                        <textarea 
                            class="form-contact__input form-contact__input--anotacoes"
                            id="mensagem"
                            name="mensagem"
                            placeholder="Digite suas anotações aqui..."
                        ></textarea>
                    </div>
                </div>

                <!-- Botões -->
                <div class="form-contact__linha">
                    <div class="form-contact__col-a"></div>

                    <div class="form-contact__col-b form-contact__col-b-botoes">
                        <button onclick="validarFormulario()" type="button">Cadastrar</button>
                        <button type="reset">Limpar</button>
                    </div>
                </div>

            </form>
        </div>
    </main>

    <footer>
        Todos os direitos reservados
    </footer>

    <script src="./js/script.js"></script>
</body>
</html>
